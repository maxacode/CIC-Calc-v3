name: Deploy GitHub Pages (main + dev paths) 

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Build static artifact with both variants
        run: |
          mkdir -p _site
          cp -r main _site/main
          cp -r dev _site/dev
          cat > _site/index.html <<'HTML'
          <!doctype html><html><body style="font-family:Inter,Arial;padding:40px">
          <h2>CIC Calc v3 Deployments</h2>
          <ul>
            <li><a href="./main/">Main deployment</a></li>
            <li><a href="./dev/">Dev deployment</a></li>
          </ul>
          </body></html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
